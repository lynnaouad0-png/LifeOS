version: '3.8'

services:
  # --- YOUR EXISTING SERVICES ---
  postgres:
    image: postgres:15-alpine
    container_name: lifeos_postgres
    environment:
      POSTGRES_USER: lifeos_developer
      POSTGRES_PASSWORD: my_local_secure_password_123
      POSTGRES_DB: lifeos_core_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lifeos_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # --- NEW: ADD THIS SERVICE ---
  lifeos_app:
    build: .
    container_name: lifeos_app
    depends_on:
      - postgres
      - qdrant
    environment:
      DATABASE_URL: "postgresql://lifeos_developer:my_local_secure_password_123@postgres:5432/lifeos_core_db"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - .:/app
    tty: true
    stdin_open: true

volumes:
  postgres_storage:
  qdrant_storage: